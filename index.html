<!DOCTYPE html>

  <header class="site-header">

      <a href="index.html" class="active">work</a>

  <!--
    THE GRID
    Each <a> below is one clickable tile that links to a project page.
    Every project has its OWN folder inside images/ — so editing one
    project's images never touches another's. See README.txt.

    To add a project:
      1. Copy one whole <a class="work-tile">...</a> block
      2. Make a new folder in images/ for it, e.g. images/my-new-project/
      3. Copy projects/project-template.html, rename it e.g. my-new-project.html
      4. Point the href and <img src> below at the new folder/file
      5. Change the title/tag text inside .tile-label

    To use a VIDEO instead of an image for a tile, replace the <img> line with:
      <video src="images/folder-name/cover.mp4" autoplay muted loop playsinline></video>
  -->

  <main class="work-grid">

    <a class="work-tile" href="projects/thrillberta.html">
      <img src="images/thrillberta/cover.jpg" alt="Thrillberta cover image">
      <div class="tile-label">
        <span>Thrillberta</span>
      
      </div>
    </a>

    <a class="work-tile" href="projects/fanduel-halftime-casino.html">
      <img src="images/fanduel-halftime-casino/cover.jpg" alt="FanDuel Halftime Casino cover image">
      <div class="tile-label">
        <span>FanDuel Halftime Casino</span>
      
      </div>
    </a>

    <a class="work-tile" href="projects/every-step-is-fitness.html">
      <img src="images/every-step-is-fitness/cover.jpg" alt="Every Step is Fitness cover image">
      <div class="tile-label">
        <span>Every Step is Fitness</span>
      
      </div>
    </a>

    <a class="work-tile" href="projects/adrift-skate.html">
      <img src="images/adrift-skate/cover.jpg" alt="Adrift Skate cover image">
      <div class="tile-label">
        <span>Adrift Skate</span>
   
      </div>
    </a>

    <a class="work-tile" href="projects/taste-the-wild.html">
      <img src="images/taste-the-wild/cover.jpg" alt="Taste the Wild cover image">
      <div class="tile-label">
        <span>Taste the Wild</span>
    
      </div>
    </a>


    <a class="work-tile" href="projects/one-offs.html">
      <img src="images/one-offs/cover.jpg" alt="One-Offs cover image">
      <div class="tile-label">
        <span>One-Offs</span>
   
      </div>
    </a>

  </main>

</body>
