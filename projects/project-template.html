<body>

  <header class="site-header">

    <nav class="site-nav">
      <a href="../index.html">work</a>

  <section class="project-header">
    <a class="back-link" href="../index.html">&larr; back to work</a>
    <h1 class="project-title">Project Title</h1>
    <div class="project-meta">Client Name · Role · Year</div>
  </section>

  <!--
    PROJECT MEDIA
    All images/videos for THIS project live in one folder:
      images/your-project-folder-name/
    Drop new files straight into that folder, then add a line
    below pointing to them. Filenames only need to be unique
    WITHIN this folder — every project has its own, so
    "01.jpg" in one project never touches "01.jpg" in another.

    Each item is wrapped in a .media-frame div — keep that
    wrapper, it's what keeps tall (portrait) images from
    running off the page. Landscape and portrait images can
    be mixed freely in any order.

    For a video, swap the <img> line for:
      <video src="../images/your-project-folder-name/01.mp4" controls></video>
  -->

  <main class="project-media">
    <div class="media-frame">
      <img src="../images/your-project-folder-name/01.jpg" alt="Description of image 1">
    </div>
    <div class="media-frame">
      <img src="../images/your-project-folder-name/02.jpg" alt="Description of image 2">
    </div>
    <div class="media-frame">
      <img src="../images/your-project-folder-name/03.jpg" alt="Description of image 3">
    </div>
    <div class="media-frame">
      <img src="../images/your-project-folder-name/04.jpg" alt="Description of image 4">
    </div>
  </main>

  <!--

  -->
  <nav class="project-nav">
